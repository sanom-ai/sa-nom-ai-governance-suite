name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.14']
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt
            pyproject.toml

      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run lightweight security audit
        run: python -m pip_audit -r requirements-dev.txt

      - name: Lint Python sources
        run: python -m ruff check .

      - name: Lint core modules with strict rule set
        run: python -m ruff check sa_nom_governance/core --select E,F,I --ignore E501

      - name: Run static type checks
        run: python -m mypy

      - name: Compile Python sources
        run: python -m compileall -q .

      - name: Run test suite with coverage
        run: python -m pytest _support/tests

      - name: Enforce core module coverage floor
        run: python scripts/check_core_coverage.py coverage.xml 82

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml-${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: error


  pt_oss_advisory:
    name: pt-oss-advisory
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt
            pyproject.toml

      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run PT-OSS advisory check (non-blocking)
        id: ptoss
        continue-on-error: true
        run: python -m pytest --no-cov _support/tests/test_pt_oss_engine.py -q

      - name: Publish PT-OSS advisory summary
        if: always()
        run: |
          if [ "${{ steps.ptoss.outcome }}" = "success" ]; then
            python scripts/pt_oss_advisory_report.py >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## PT-OSS Advisory" >> "$GITHUB_STEP_SUMMARY"
            echo "PT-OSS advisory check reported findings or execution issues (non-blocking)." >> "$GITHUB_STEP_SUMMARY"
          fi


  scripts_lint_advisory:
    name: scripts-lint-advisory
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt
            pyproject.toml

      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run scripts lint advisory (non-blocking)
        id: scriptslint
        continue-on-error: true
        run: python -m ruff check scripts --select E402,F403

      - name: Publish scripts lint advisory summary
        if: always()
        run: |
          if [ "${{ steps.scriptslint.outcome }}" = "success" ]; then
            echo "## Scripts Lint Advisory" >> "$GITHUB_STEP_SUMMARY"
            echo "scripts/ wrapper lint advisory passed." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## Scripts Lint Advisory" >> "$GITHUB_STEP_SUMMARY"
            echo "scripts/ wrapper lint advisory found debt (non-blocking)." >> "$GITHUB_STEP_SUMMARY"
          fi


  publish_verify_status:
    name: publish-legacy-verify-status
    runs-on: ubuntu-latest
    needs: verify
    if: always()
    steps:
      - name: Publish legacy verify status context
        uses: actions/github-script@v7
        with:
          script: |
            const state = '${{ needs.verify.result }}' === 'success' ? 'success' : 'failure';
            const sha = context.eventName === 'pull_request'
              ? context.payload.pull_request.head.sha
              : context.sha;
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha,
              state,
              context: 'verify',
              description: state === 'success'
                ? 'Legacy verify compatibility status published.'
                : 'Legacy verify compatibility status failed.',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
