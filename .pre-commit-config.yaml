repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.0
    hooks:
      - id: ruff-check
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.0
    hooks:
      - id: mypy
        args: ["--config-file=pyproject.toml"]

  - repo: local
    hooks:
      - id: pytest-smoke
        name: pytest smoke
        entry: python -m pytest _support/tests/test_decision_flow.py -q
        language: system
        pass_filenames: false
