apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sanom.fullname" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "sanom.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "sanom.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      securityContext:
{{ toYaml .Values.podSecurityContext | indent 8 }}
      containers:
        - name: sa-nom-ai-governance-suite
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["python", "run_private_server.py", "--host", "0.0.0.0", "--port", "8080"]
          securityContext:
{{ toYaml .Values.securityContext | indent 12 }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "sanom.fullname" . }}
            - secretRef:
                name: {{ include "sanom.fullname" . }}-secrets
          volumeMounts:
            - name: runtime-data
              mountPath: /app/_runtime
          livenessProbe:
            httpGet:
              path: /dashboard_index.html
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          readinessProbe:
            exec:
              command: ["python", "dashboard_server.py", "--check-only"]
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
{{ toYaml .Values.resources | indent 12 }}
      volumes:
        - name: runtime-data
{{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "sanom.fullname" . }}-runtime
{{- else }}
          emptyDir: {}
{{- end }}
