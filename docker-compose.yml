services:
  sanom-ai-governance-suite:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sanom-ai-governance-suite
    restart: unless-stopped
    ports:
      - "${SANOM_SERVER_PORT:-8080}:8080"
    environment:
      SANOM_ENV: "${SANOM_ENV:-production}"
      SANOM_API_TOKEN: "${SANOM_API_TOKEN:-replace-with-secure-owner-token}"
      SANOM_SERVER_HOST: "0.0.0.0"
      SANOM_SERVER_PORT: "8080"
      SANOM_SERVER_PUBLIC_BASE_URL: "${SANOM_SERVER_PUBLIC_BASE_URL:-http://localhost:8080}"
      SANOM_STRICT_STARTUP_VALIDATION: "${SANOM_STRICT_STARTUP_VALIDATION:-true}"
      SANOM_ACCESS_PROFILES_REQUIRE_HASHES: "${SANOM_ACCESS_PROFILES_REQUIRE_HASHES:-true}"
      SANOM_SESSION_TTL_MINUTES: "${SANOM_SESSION_TTL_MINUTES:-720}"
      SANOM_SESSION_IDLE_TIMEOUT_MINUTES: "${SANOM_SESSION_IDLE_TIMEOUT_MINUTES:-60}"
      SANOM_TRUSTED_REGISTRY_KEY: "${SANOM_TRUSTED_REGISTRY_KEY:-replace-with-secure-registry-key}"
      SANOM_TRUSTED_REGISTRY_KEY_ID: "${SANOM_TRUSTED_REGISTRY_KEY_ID:-SANOM_PROD_REGISTRY}"
      SANOM_TRUSTED_REGISTRY_SIGNED_BY: "${SANOM_TRUSTED_REGISTRY_SIGNED_BY:-EXEC_OWNER}"
      SANOM_TRUSTED_REGISTRY_REQUIRE_SIGNATURE: "${SANOM_TRUSTED_REGISTRY_REQUIRE_SIGNATURE:-true}"
      SANOM_RETENTION_AUDIT_DAYS: "${SANOM_RETENTION_AUDIT_DAYS:-2555}"
      SANOM_RETENTION_OVERRIDE_DAYS: "${SANOM_RETENTION_OVERRIDE_DAYS:-2555}"
      SANOM_RETENTION_LOCK_DAYS: "${SANOM_RETENTION_LOCK_DAYS:-30}"
      SANOM_RETENTION_CONSISTENCY_DAYS: "${SANOM_RETENTION_CONSISTENCY_DAYS:-365}"
      SANOM_RETENTION_SESSION_DAYS: "${SANOM_RETENTION_SESSION_DAYS:-90}"
      SANOM_RETENTION_ROLE_PRIVATE_STUDIO_DAYS: "${SANOM_RETENTION_ROLE_PRIVATE_STUDIO_DAYS:-2555}"
      SANOM_RETENTION_ARCHIVE_DIR: "${SANOM_RETENTION_ARCHIVE_DIR:-/app/_runtime/runtime_archive}"
      SANOM_PERSISTENCE_BACKEND: "${SANOM_PERSISTENCE_BACKEND:-file}"
      SANOM_POSTGRES_DSN: "${SANOM_POSTGRES_DSN:-postgresql://sanom:sanom-change-me@postgres:5432/sanom}"
      SANOM_POSTGRES_SCHEMA: "${SANOM_POSTGRES_SCHEMA:-public}"
      SANOM_POSTGRES_NATIVE_ENABLED: "${SANOM_POSTGRES_NATIVE_ENABLED:-false}"
      SANOM_POSTGRES_CONNECT_TIMEOUT_SECONDS: "${SANOM_POSTGRES_CONNECT_TIMEOUT_SECONDS:-5}"
      SANOM_COORDINATION_BACKEND: "${SANOM_COORDINATION_BACKEND:-file}"
      SANOM_REDIS_URL: "${SANOM_REDIS_URL:-redis://default:sanom-change-me@redis:6379/0}"
      SANOM_REDIS_NATIVE_ENABLED: "${SANOM_REDIS_NATIVE_ENABLED:-false}"
      SANOM_REDIS_QUEUE_NAMESPACE: "${SANOM_REDIS_QUEUE_NAMESPACE:-sanom}"
      SANOM_REDIS_CONNECT_TIMEOUT_SECONDS: "${SANOM_REDIS_CONNECT_TIMEOUT_SECONDS:-5}"
      SANOM_OUTBOUND_HTTP_INTEGRATIONS_ENABLED: "${SANOM_OUTBOUND_HTTP_INTEGRATIONS_ENABLED:-false}"
      SANOM_INTEGRATION_DELIVERY_TIMEOUT_SECONDS: "${SANOM_INTEGRATION_DELIVERY_TIMEOUT_SECONDS:-5}"
      SANOM_INTEGRATION_DEFAULT_MAX_ATTEMPTS: "${SANOM_INTEGRATION_DEFAULT_MAX_ATTEMPTS:-3}"
      SANOM_INTEGRATION_RETRY_BACKOFF_MS: "${SANOM_INTEGRATION_RETRY_BACKOFF_MS:-250}"
      SANOM_MODEL_PROVIDER_DEFAULT: "${SANOM_MODEL_PROVIDER_DEFAULT:-}"
      SANOM_MODEL_PROVIDER_TIMEOUT_SECONDS: "${SANOM_MODEL_PROVIDER_TIMEOUT_SECONDS:-15}"
      SANOM_OPENAI_API_KEY: "${SANOM_OPENAI_API_KEY:-}"
      SANOM_OPENAI_BASE_URL: "${SANOM_OPENAI_BASE_URL:-https://api.openai.com/v1}"
      SANOM_OPENAI_MODEL: "${SANOM_OPENAI_MODEL:-}"
      SANOM_ANTHROPIC_API_KEY: "${SANOM_ANTHROPIC_API_KEY:-}"
      SANOM_ANTHROPIC_BASE_URL: "${SANOM_ANTHROPIC_BASE_URL:-https://api.anthropic.com}"
      SANOM_ANTHROPIC_VERSION: "${SANOM_ANTHROPIC_VERSION:-2023-06-01}"
      SANOM_ANTHROPIC_MODEL: "${SANOM_ANTHROPIC_MODEL:-}"
      SANOM_OLLAMA_BASE_URL: "${SANOM_OLLAMA_BASE_URL:-http://ollama:11434}"
      SANOM_OLLAMA_MODEL: "${SANOM_OLLAMA_MODEL:-}"
    volumes:
      - sanom_runtime:/app/_runtime
    healthcheck:
      test: ["CMD", "python", "dashboard_server.py", "--check-only"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    profiles: ["enterprise-target"]
    environment:
      POSTGRES_DB: "${SANOM_POSTGRES_DB:-sanom}"
      POSTGRES_USER: "${SANOM_POSTGRES_USER:-sanom}"
      POSTGRES_PASSWORD: "${SANOM_POSTGRES_PASSWORD:-sanom-change-me}"
    volumes:
      - sanom_postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    profiles: ["enterprise-target"]
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - sanom_redis:/data

  ollama:
    image: ollama/ollama:latest
    profiles: ["local-llm"]
    ports:
      - "11434:11434"
    volumes:
      - sanom_ollama:/root/.ollama

volumes:
  sanom_runtime:
  sanom_postgres:
  sanom_redis:
  sanom_ollama:
